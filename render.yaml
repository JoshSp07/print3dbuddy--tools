services:
  - type: web
    name: print3dbuddy-tools
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DOMAIN
        value: https://tools.print3dbuddy.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_LIFETIME
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
