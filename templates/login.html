{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div style="max-width:420px; margin:0 auto;">
  <h1 style="font-size:1.6rem; margin-bottom:8px;">Log in</h1>
  <p style="color:var(--muted); margin-bottom:28px;">Welcome back.</p>

  <form method="POST">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required placeholder="Your password">

    <button type="submit" class="btn" style="width:100%;">Log in</button>
  </form>

  <p style="text-align:center; margin-top:20px; color:var(--muted); font-size:0.9rem;">
    Don't have an account? <a href="/register">Sign up free</a>
  </p>
</div>
{% endblock %}
